<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Реєстрація — Hotelux</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">

<div class="panel">
  <div class="panel-lines"></div>
  <div class="corner corner--tl"></div>
  <div class="corner corner--br"></div>
  <div class="panel-content">
    <div class="panel-logo">HOTE<span>LUX</span></div>
    <div class="panel-tagline">Premium Room Booking</div>
    <div class="panel-divider"></div>
    <div class="panel-steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text">Створіть акаунт безкоштовно</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text">Переглядайте доступні кімнати</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text">Додавайте та керуйте номерами</div>
      </div>
    </div>
  </div>
</div>

<div class="form-side">
  <div class="form-wrapper">
    <h1 class="form-heading">Реєстрація</h1>
    <p class="form-sub">Вже маєте акаунт? <a href="/login.html">Увійти</a></p>

    <form id="registerForm">
      <div class="field">
        <label for="name">Ім'я</label>
        <input type="text" id="name" placeholder="Ваше ім'я" required>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input type="password" id="password" placeholder="Мінімум 8 символів" required>
      </div>
      <div class="field">
        <label for="confirmPassword">Підтвердіть пароль</label>
        <input type="password" id="confirmPassword" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary"><span>Зареєструватися</span></button>
    </form>

    <p id="message" class="message center"></p>
  </div>
</div>

<script>
  const API_URL = 'http://localhost:3000';

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = document.getElementById('message');
    msg.textContent = '';
    msg.className = 'message center';

    const body = {
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
      confirmPassword: document.getElementById('confirmPassword').value
    };

    try {
      const response = await fetch(`${API_URL}/api/auth/register`, {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const data = await response.json();

      if (!response.ok) {
        msg.textContent = data.message || 'Помилка реєстрації';
        return;
      }

      // Зберігаємо лише дані користувача (не токен — він у cookie)
      localStorage.setItem('user', JSON.stringify(data.user));
      msg.className = 'message center success';
      msg.textContent = 'Реєстрація успішна!';
      setTimeout(() => window.location.href = '/index.html', 800);
    } catch {
      msg.textContent = 'Помилка з\'єднання з сервером';
    }
  });
</script>

</body>
</html>
