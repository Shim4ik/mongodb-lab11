<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бронювання — Hotelux</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .field-error {
            display: block;
            font-size: 11px;
            color: var(--error);
            margin-top: 5px;
            min-height: 16px;
            letter-spacing: 0.02em;
        }

        input.input-error { border-color: var(--error); box-shadow: 0 0 0 3px rgba(192,57,43,0.08); }
        input.input-valid { border-color: #4caf50;      box-shadow: 0 0 0 3px rgba(76,175,80,0.08); }

        #serverErrors { margin-bottom: 24px; }

        .server-error-item {
            font-size: 12px;
            color: var(--error);
            padding: 10px 14px;
            background: rgba(192,57,43,0.06);
            border-left: 3px solid var(--error);
            margin-bottom: 6px;
            letter-spacing: 0.02em;
        }

        .btn.btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
        .btn.btn-primary:disabled:hover { background: var(--dark); color: var(--cream); }

        .room-banner {
            background: var(--dark);
            border-left: 3px solid var(--gold);
            padding: 16px 20px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .room-banner-num {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 400;
            color: var(--gold);
            line-height: 1;
            flex-shrink: 0;
        }
        .room-banner-details { display: flex; flex-direction: column; gap: 3px; }
        .room-banner-type { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(245,240,232,0.45); }
        .room-banner-price { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--cream); font-weight: 300; }

        .nights-hint {
            display: block;
            font-size: 18px;
            color: var(--gold);
            margin-top: 8px;
            min-height: 22px;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            letter-spacing: 0.03em;
        }
    </style>
</head>
<body>

<nav>
    <a href="/index.html" class="nav-logo">HOTE<span>LUX</span></a>
    <div class="nav-links">
        <a href="/index.html">Усі кімнати</a>
        <span class="nav-user--create" id="navUser"></span>
        <a href="#" id="logoutLink">Вийти</a>
    </div>
</nav>

<main class="create-main">
    <div class="page-header">
        <div class="page-label">Готель · Бронювання</div>
        <h1 class="page-title">Забронювати кімнату</h1>
    </div>

    <div class="card">
        <div class="room-banner" id="roomBanner" style="display:none">
            <div class="room-banner-num" id="bannerNum">—</div>
            <div class="room-banner-details">
                <span class="room-banner-type" id="bannerType"></span>
                <span class="room-banner-price" id="bannerPrice"></span>
            </div>
        </div>

        <div id="serverErrors"></div>

        <form id="bookingForm">

            <div class="row">
                <div class="field">
                    <label for="checkIn">Дата заїзду</label>
                    <input type="date" id="checkIn" required>
                    <span class="field-error" id="checkInError"></span>
                </div>
                <div class="field">
                    <label for="checkOut">Дата виїзду</label>
                    <input type="date" id="checkOut" required>
                    <span class="field-error" id="checkOutError"></span>
                    <span class="nights-hint" id="nightsHint"></span>
                </div>
            </div>

            <div class="field">
                <label for="guests">Кількість гостей</label>
                <input type="number" id="guests" placeholder="1" min="1" max="10" required>
                <span class="field-error" id="guestsError"></span>
            </div>

            <div class="divider"></div>

            <div class="actions">
                <a href="/index.html" class="btn btn-secondary" style="display:flex;align-items:center;justify-content:center;text-decoration:none;">Скасувати</a>
                <button type="submit" class="btn btn-primary" id="submitBtn" disabled><span>Підтвердити бронювання</span></button>
            </div>
        </form>

        <p id="message" class="message"></p>
    </div>
</main>

<script>
    const API_URL = 'http://localhost:3000';

    // ── Auth guard ────────────────────────────────────────────────
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!user) window.location.href = '/login.html';
    if (user?.name) document.getElementById('navUser').textContent = user.name;

    document.getElementById('logoutLink').addEventListener('click', async (e) => {
        e.preventDefault();
        await fetch(`${API_URL}/api/auth/logout`, { method: 'POST', credentials: 'include' });
        localStorage.removeItem('user');
        window.location.href = '/login.html';
    });

    // ── roomId з URL ──────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const roomId = params.get('roomId');
    if (!roomId) window.location.href = '/index.html';

    // ── Завантажити інфо про кімнату ──────────────────────────────
    let roomCapacity = 10;
    let roomPricePerNight = 0;

    async function loadRoomInfo() {
        try {
            const res = await fetch(`${API_URL}/api/rooms/${roomId}`, { credentials: 'include' });
            if (!res.ok) return;
            const { data: r } = await res.json();

            roomCapacity      = r.capacity;
            roomPricePerNight = r.price;

            document.getElementById('bannerNum').textContent   = `№${r.number}`;
            document.getElementById('bannerType').textContent  = r.type;
            document.getElementById('bannerPrice').textContent = `$${r.price} / ніч`;
            document.getElementById('roomBanner').style.display = 'flex';

            const guestsEl = document.getElementById('guests');
            guestsEl.max         = r.capacity;
            guestsEl.placeholder = `1–${r.capacity}`;
        } catch { /* ігноруємо — банер просто не з'явиться */ }
    }

    loadRoomInfo();

    // ── Мінімальна дата = сьогодні ───────────────────────────────
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('checkIn').min  = today;
    document.getElementById('checkOut').min = today;

    // ── Helpers ──────────────────────────────────────────────────
    function setError(el, errorId, msg) {
        el.classList.add('input-error');
        el.classList.remove('input-valid');
        document.getElementById(errorId).textContent = msg;
    }
    function setValid(el, errorId) {
        el.classList.remove('input-error');
        el.classList.add('input-valid');
        document.getElementById(errorId).textContent = '';
    }
    function clearState(el, errorId) {
        el.classList.remove('input-error', 'input-valid');
        document.getElementById(errorId).textContent = '';
    }

    // ── Validators ────────────────────────────────────────────────
    const checkInEl  = document.getElementById('checkIn');
    const checkOutEl = document.getElementById('checkOut');
    const guestsEl   = document.getElementById('guests');
    const nightsHint = document.getElementById('nightsHint');

    function validateCheckIn() {
        if (!checkInEl.value) { clearState(checkInEl, 'checkInError'); return false; }
        if (checkInEl.value < today) {
            setError(checkInEl, 'checkInError', 'Дата не може бути в минулому');
            return false;
        }
        setValid(checkInEl, 'checkInError');
        checkOutEl.min = checkInEl.value;
        if (checkOutEl.value) validateCheckOut();
        return true;
    }

    function validateCheckOut() {
        if (!checkOutEl.value) { clearState(checkOutEl, 'checkOutError'); nightsHint.textContent = ''; return false; }
        if (checkOutEl.value <= checkInEl.value) {
            setError(checkOutEl, 'checkOutError', 'Виїзд має бути після заїзду');
            nightsHint.textContent = '';
            return false;
        }
        setValid(checkOutEl, 'checkOutError');
        const nights = Math.round((new Date(checkOutEl.value) - new Date(checkInEl.value)) / 86400000);
        nightsHint.textContent = roomPricePerNight
            ? `${nights} ніч · Разом: $${(nights * roomPricePerNight).toFixed(2)}`
            : `${nights} ніч`;
        return true;
    }

    function validateGuests() {
        if (!guestsEl.value) { clearState(guestsEl, 'guestsError'); return false; }
        const val = Number(guestsEl.value);
        if (!Number.isInteger(val) || val < 1) {
            setError(guestsEl, 'guestsError', 'Мінімум 1 гість');
            return false;
        }
        // max береться з моделі (capacity кімнати, але не більше 10)
        if (val > roomCapacity) {
            setError(guestsEl, 'guestsError', `Максимум ${roomCapacity} осіб для цієї кімнати`);
            return false;
        }
        if (val > 10) {
            setError(guestsEl, 'guestsError', 'Не більше 10 гостей');
            return false;
        }
        setValid(guestsEl, 'guestsError');
        return true;
    }

    function updateSubmit() {
        document.getElementById('submitBtn').disabled =
            !(validateCheckIn() && validateCheckOut() && validateGuests());
    }

    checkInEl.addEventListener('input',  () => { validateCheckIn();  updateSubmit(); });
    checkOutEl.addEventListener('input', () => { validateCheckOut(); updateSubmit(); });
    guestsEl.addEventListener('input',   () => { validateGuests();   updateSubmit(); });

    // ── Submit ────────────────────────────────────────────────────
    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const msg          = document.getElementById('message');
        const serverErrors = document.getElementById('serverErrors');
        const btn          = document.getElementById('submitBtn');
        msg.textContent    = '';
        msg.className      = 'message';
        serverErrors.innerHTML = '';
        btn.disabled = true;

        // room береться з :roomId у URL (mergeParams), user — з req.user на сервері
        const body = {
            checkIn:  checkInEl.value,
            checkOut: checkOutEl.value,
            guests:   Number(guestsEl.value)
        };

        try {
            const response = await fetch(`${API_URL}/api/rooms/${roomId}/bookings`, {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            const data = await response.json();

            if (response.status === 401) {
                localStorage.removeItem('user');
                window.location.href = '/login.html';
                return;
            }

            if (!response.ok) {
                const messages = data.errors || [data.message || 'Помилка бронювання'];
                serverErrors.innerHTML = messages
                    .map(m => `<div class="server-error-item">${m}</div>`)
                    .join('');
                btn.disabled = false;
                return;
            }

            msg.className   = 'message success';
            msg.textContent = 'Бронювання успішно створено!';
            setTimeout(() => window.location.href = '/index.html', 1200);
        } catch {
            serverErrors.innerHTML = `<div class="server-error-item">Помилка з'єднання з сервером</div>`;
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
